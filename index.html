<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Window</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0D0D0B">
  <meta name="description" content="Find the best weather window for your outdoor tasks">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weather Window">
  <style>
    :root {
      --bg:        #0D0D0B;
      --bg-1:      #141412;
      --bg-2:      #1A1A17;
      --bg-3:      #202020;
      --line:      rgba(255,255,255,0.07);
      --line-2:    rgba(255,255,255,0.12);
      --ink:       #EDE9E4;
      --ink-2:     rgba(237,233,228,0.5);
      --ink-3:     rgba(237,233,228,0.25);
      --amber:     #C9894E;
      --amber-bg:  rgba(201,137,78,0.1);
      --amber-line:rgba(201,137,78,0.25);
      --green:     #5F9070;
      --green-bg:  rgba(95,144,112,0.12);
      --red:       #8F5959;
      --red-bg:    rgba(143,89,89,0.12);
      --r:         14px;
      --r-sm:      8px;
      --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 2px 6px rgba(0,0,0,0.5), 0 12px 32px rgba(0,0,0,0.45);
      --shadow-lift: 0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 12px rgba(0,0,0,0.6), 0 20px 48px rgba(0,0,0,0.55);
      --r-xs:      5px;
    }
    /* ── Light mode ─────────────────────────── */
    [data-theme="light"] {
      --bg:        #F2EEE7;
      --bg-1:      #EAE5DC;
      --bg-2:      #DDD8CE;
      --bg-3:      #CFC9BE;
      --line:      rgba(0,0,0,0.09);
      --line-2:    rgba(0,0,0,0.16);
      --ink:       #1A1A16;
      --ink-2:     rgba(26,26,22,0.58);
      --ink-3:     rgba(26,26,22,0.34);
      --amber:     #A86D28;
      --amber-bg:  rgba(168,109,40,0.1);
      --amber-line:rgba(168,109,40,0.28);
      --green:     #3A6E50;
      --green-bg:  rgba(58,110,80,0.12);
      --red:       #7A3535;
      --red-bg:    rgba(122,53,53,0.12);
      --shadow-card: 0 1px 0 rgba(255,255,255,0.7) inset, 0 2px 6px rgba(0,0,0,0.07), 0 10px 24px rgba(0,0,0,0.07);
      --shadow-lift: 0 1px 0 rgba(255,255,255,0.9) inset, 0 4px 14px rgba(0,0,0,0.1), 0 18px 40px rgba(0,0,0,0.1);
    }
    [data-theme="light"] body::before { background: rgba(242,238,231,0.55); }
    [data-theme="light"] .card { background: rgba(255,255,255,0.76); border-color: rgba(0,0,0,0.09); }
    [data-theme="light"] .card:hover { border-color: rgba(0,0,0,0.16); }
    [data-theme="light"] .card.peak { border-color: rgba(58,110,80,0.3); }
    [data-theme="light"] #bottom-nav { background: rgba(242,238,231,0.96); border-top-color: rgba(0,0,0,0.1); }
    [data-theme="light"] #status-bar { background: rgba(234,229,220,0.8); }
    [data-theme="light"] .sheet { background: var(--bg-1); }
    [data-theme="light"] .fi, [data-theme="light"] .fs { background: var(--bg); border-color: rgba(0,0,0,0.12); }
    [data-theme="light"] .icon-opt { background: var(--bg); border-color: rgba(0,0,0,0.1); }
    [data-theme="light"] .alt-chip { background: var(--bg-1); }
    [data-theme="light"] .alt-chip.active { background: var(--bg-2); }
    [data-theme="light"] .done-card { background: rgba(255,255,255,0.7); }
    [data-theme="light"] .s-hr { background: rgba(0,0,0,0.05); }
    [data-theme="light"] .s-hr.night { background: rgba(0,0,0,0.04); }
    [data-theme="light"] .tpl-btn { background: var(--bg); }
    [data-theme="light"] .geo-result { background: var(--bg); }
    [data-theme="light"] .s-list-item { background: var(--bg); }
    [data-theme="light"] .nav-tab.nav-add { color: #1A1A16; }
    [data-theme="light"] .nav-tab.nav-add .ni { color: #1A1A16; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg) url("I Want To Create An Image That Represents Weather .png") center center / cover no-repeat fixed;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10,10,8,0.62);
      z-index: 0;
      pointer-events: none;
    }
    #app { position: relative; z-index: 1; }
    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 90px;
    }

    /* ── Header ─────────────────────────────── */
    header {
      padding: 32px 20px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .app-eyebrow {
      font-size: 0.65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--amber);
      font-family: 'Menlo','Monaco',monospace;
    }
    .app-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-size: 1.75rem;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--ink);
    }
    .btn-icon-sm {
      width: 32px; height: 32px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--ink-2);
      font-size: 0.9rem;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .btn-icon-sm:hover { border-color: var(--line-2); color: var(--ink); }

    /* ── Status pill ────────────────────────── */
    #status-bar {
      margin: 0 20px 20px;
      padding: 7px 12px;
      background: rgba(16,16,14,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 40px;
      font-size: 0.68rem;
      color: var(--ink-3);
      font-family: 'Menlo','Monaco',monospace;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .s-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--ink-3);
      flex-shrink: 0;
    }
    .s-dot.live  { background: var(--green); }
    .s-dot.stale { background: var(--amber); }

    /* ── Views ──────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Cards ──────────────────────────────── */
    #cards {
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── 3D card depth ───────────────────────── */
    .card {
      background: rgba(16,16,14,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform .22s ease, box-shadow .22s ease, border-color .15s;
      transform: perspective(900px) translateZ(0);
      will-change: transform;
    }
    .card:hover {
      border-color: var(--line-2);
      transform: perspective(900px) translateY(-3px) translateZ(6px);
      box-shadow: var(--shadow-lift);
    }
    /* Peak glow for score ≥ 90 */
    .card.peak {
      border-color: rgba(95,144,112,0.28);
      animation: card-breathe 3.2s ease-in-out infinite;
    }
    @keyframes card-breathe {
      0%,100% { box-shadow: var(--shadow-card), 0 0 0 0 rgba(95,144,112,0); }
      50%      { box-shadow: var(--shadow-lift), 0 0 28px rgba(95,144,112,0.22), 0 0 0 1px rgba(95,144,112,0.18); }
    }

    /* Coloured score bar on left edge */
    .card-inner {
      display: flex;
      gap: 0;
    }
    .card-accent {
      width: 3px;
      flex-shrink: 0;
      background: var(--line);
      border-radius: 0;
    }
    .card-accent.high { background: var(--green); }
    .card-accent.mid  { background: var(--amber); }
    .card-accent.low  { background: var(--red); }
    .card.peak .card-accent.high {
      animation: accent-pulse 3.2s ease-in-out infinite;
    }
    @keyframes accent-pulse {
      0%,100% { box-shadow: none; opacity: 1; }
      50%      { box-shadow: 2px 0 14px rgba(95,144,112,0.7); opacity: 0.85; }
    }

    .card-body { flex: 1; min-width: 0; padding: 16px 16px 14px 14px; overflow: hidden; }

    .card-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 13px;
    }
    .task-icon {
      font-size: 1.1rem;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .task-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
      line-height: 1.2;
      flex: 1;
    }
    .score-pill {
      font-family: 'Menlo','Monaco',monospace;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .score-pill.high { background: var(--green-bg); color: #82C495; }
    .score-pill.mid  { background: var(--amber-bg); color: #C9894E; }
    .score-pill.low  { background: var(--red-bg);   color: #C47A7A; }
    .score-pill.none { background: rgba(255,255,255,.04); color: var(--ink-3); }
    .card.peak .score-pill.high {
      animation: pill-pulse 3.2s ease-in-out infinite;
    }
    @keyframes pill-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(95,144,112,0); }
      50%      { box-shadow: 0 0 0 5px rgba(95,144,112,0.15), 0 0 12px rgba(95,144,112,0.35); }
    }

    .card-window-label {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--ink-3);
      font-family: 'Menlo','Monaco',monospace;
      margin-bottom: 3px;
    }
    .card-window {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .card.peak .card-window { animation: text-glow 3.2s ease-in-out infinite; }
    .card-window-dim { color: var(--ink-2) !important; font-size: 1rem !important; font-style: italic; }
    @keyframes text-glow {
      0%,100% { text-shadow: none; }
      50%      { text-shadow: 0 0 16px rgba(95,144,112,0.45), 0 0 32px rgba(95,144,112,0.2); }
    }
    .card-reason {
      font-size: 0.76rem;
      color: var(--ink-3);
      margin-bottom: 12px;
    }
    .card-location-tag {
      display: inline-block;
      font-size: 0.66rem;
      font-family: 'Menlo','Monaco',monospace;
      padding: 2px 8px;
      background: var(--bg-3);
      border-radius: 20px;
      color: var(--ink-3);
      margin-left: 4px;
    }

    /* ── Hourly strip ───────────────────────── */
    .strip-wrap { margin-bottom: 12px; }
    .strip-day-label {
      font-size: 0.62rem;
      color: var(--ink-3);
      font-family: 'Menlo','Monaco',monospace;
      margin-bottom: 6px;
    }
    .strip {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 0;
      height: 48px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.55) inset, 0 0 0 1px rgba(255,255,255,0.05);
    }
    .s-hr {
      position: relative;
      background: rgba(255,255,255,0.025);
    }
    .s-hr + .s-hr { border-left: 1px solid rgba(0,0,0,0.18); }
    .s-hr.good  { background: linear-gradient(to bottom, #3E7D55 0%, #1C4230 100%); }
    .s-hr.mar   { background: linear-gradient(to bottom, #7A6020 0%, #3C2E08 100%); }
    .s-hr.rain  { background: linear-gradient(to bottom, #7A3535 0%, #3C1C1C 100%); }
    .s-hr.night { background: rgba(255,255,255,0.02); }
    .s-hr.win {
      background: linear-gradient(to bottom, #F2A55A 0%, #C9894E 45%, #8A5A28 100%) !important;
      border-left-color: rgba(255,180,100,0.25) !important;
    }

    /* Glowing bar BELOW the strip (outside overflow:hidden so glow escapes) */
    .strip-container { position: relative; }
    .strip-win-bar {
      position: absolute;
      bottom: -3px;
      height: 4px;
      border-radius: 3px;
      background: var(--amber);
      pointer-events: none;
      animation: win-bar-pulse 3.2s ease-in-out infinite;
    }
    @keyframes win-bar-pulse {
      0%,100% { opacity: 0.9; box-shadow: 0 0 8px var(--amber), 0 0 16px rgba(201,137,78,0.4); }
      50%      { opacity: 1;   box-shadow: 0 0 16px var(--amber), 0 0 32px rgba(201,137,78,0.7), 0 0 48px rgba(201,137,78,0.3); }
    }
    .strip-ticks {
      position: relative;
      height: 13px;
      margin-top: 4px;
      overflow: hidden;
    }
    .strip-ticks span {
      position: absolute;
      transform: translateX(-50%);
      font-size: 0.5rem;
      color: var(--ink-3);
      font-family: 'Menlo','Monaco',monospace;
      white-space: nowrap;
    }
    .strip-ticks span:last-child { transform: translateX(-100%); }

    /* ── Strip drag hint ──────────────────────── */
    .strip { cursor: ew-resize; }
    .strip-hint {
      font-size: 0.5rem;
      color: var(--ink-3);
      font-family: 'Menlo','Monaco',monospace;
      margin-top: 3px;
      text-align: right;
      letter-spacing: .04em;
    }

    /* ── Alternative windows ────────────────── */
    .alts { margin-top: 13px; }
    .alts-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--ink-3);
      font-family: 'Menlo','Monaco',monospace;
      display: block;
      margin-bottom: 7px;
    }
    .alts-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .alts-row::-webkit-scrollbar { display: none; }
    .alt-chip.dim {
      opacity: 0.45;
    }
    .alt-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 7px 11px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, background .15s, transform .12s;
    }
    .alt-chip:hover {
      border-color: var(--line-2);
      transform: translateY(-1px);
    }
    .alt-chip.active {
      background: var(--bg-3);
      border-color: var(--amber-line);
    }
    .alt-day {
      font-size: 0.72rem;
      color: var(--ink-2);
      white-space: nowrap;
    }
    .alt-chip.active .alt-day { color: var(--ink); }
    .alt-time {
      font-family: 'Menlo','Monaco',monospace;
      font-size: 0.65rem;
      color: var(--ink-3);
    }
    .alt-score {
      font-family: 'Menlo','Monaco',monospace;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 10px;
      margin-top: 1px;
    }
    .alt-score.high { background: var(--green-bg); color: #82C495; }
    .alt-score.mid  { background: var(--amber-bg); color: #C9894E; }
    .alt-score.low  { background: var(--red-bg);   color: #C47A7A; }

    /* ── Reminder & outcome ─────────────────── */
    .card-footer {
      border-top: 1px solid var(--line);
      padding: 12px 14px 13px 14px;
    }
    .reminder-text {
      font-size: 0.8rem;
      color: var(--ink-2);
      margin-bottom: 9px;
      line-height: 1.5;
    }
    .reminder-text strong { color: var(--ink); font-weight: 500; }
    .row-btns { display: flex; gap: 7px; }
    .btn-cta {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-weight: 600;
      background: var(--amber);
      color: #0D0D0B;
    }
    .btn-ghost-sm {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid var(--line-2);
      font-family: inherit;
      background: none;
      color: var(--ink-2);
    }
    .outcome-q {
      font-size: 0.77rem;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    .btn-outcome {
      padding: 5px 11px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
      border: 1px solid var(--line);
      background: none;
      color: var(--ink-2);
      font-family: inherit;
    }
    .btn-outcome:hover { border-color: var(--line-2); color: var(--ink); }

    .acc-tag {
      font-size: 0.63rem;
      font-family: 'Menlo','Monaco',monospace;
      color: var(--ink-3);
      display: block;
      padding-top: 10px;
    }

    /* ── Cooldown / no-window ───────────────── */
    .card-muted {
      font-size: 0.8rem;
      color: var(--ink-3);
      font-style: italic;
      margin-bottom: 2px;
    }

    /* ── Empty state ────────────────────────── */
    .empty {
      padding: 0 14px;
    }
    .empty-card {
      border: 1px dashed var(--line-2);
      border-radius: var(--r);
      padding: 44px 28px;
      text-align: center;
    }
    .empty-glyph {
      font-size: 2.4rem;
      margin-bottom: 16px;
      opacity: .5;
    }
    .empty-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-size: 1.5rem;
      letter-spacing: -0.025em;
      margin-bottom: 10px;
    }
    .empty-body {
      font-size: 0.83rem;
      color: var(--ink-2);
      line-height: 1.7;
      margin-bottom: 22px;
    }

    /* ── Week view ──────────────────────────── */
    #view-week { padding: 0 14px; }
    .week-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-size: 1.3rem;
      letter-spacing: -0.025em;
      color: var(--ink-2);
      margin-bottom: 20px;
      padding: 0 6px;
    }
    .week-rows { display: flex; flex-direction: column; gap: 12px; }
    .week-row {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: start;
    }
    .wk-day {
      text-align: right;
      padding-top: 1px;
    }
    .wk-day-name {
      font-size: 0.68rem;
      font-family: 'Menlo','Monaco',monospace;
      color: var(--ink-3);
      display: block;
    }
    .wk-day-num {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      font-size: 1rem;
      color: var(--ink-2);
      line-height: 1;
    }
    .wk-bars { display: flex; flex-direction: column; gap: 5px; }
    .wk-bar-bg {
      height: 8px;
      background: var(--bg-2);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .wk-bar-fill {
      position: absolute; top: 0; bottom: 0;
      border-radius: 4px;
    }
    .wk-task-label {
      font-size: 0.66rem;
      color: var(--ink-3);
    }
    .wk-empty { height: 8px; background: var(--bg-2); border-radius: 4px; opacity: .3; }

    /* ── Settings ───────────────────────────── */
    #view-settings { padding: 0 14px; }
    .s-section { margin-bottom: 28px; }
    .s-section-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-family: 'Menlo','Monaco',monospace;
      color: var(--ink-3);
      padding: 0 6px;
      margin-bottom: 10px;
    }
    .s-list-item {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .s-item-name { font-size: 0.88rem; }
    .s-item-sub {
      font-size: 0.67rem;
      font-family: 'Menlo','Monaco',monospace;
      color: var(--ink-3);
      margin-top: 2px;
    }
    .btn-del {
      background: none; border: none;
      color: var(--ink-3); cursor: pointer;
      font-size: 0.85rem; padding: 4px 6px;

    }
    .btn-del:hover { color: #C47A7A; }
    .btn-outline {
      padding: 9px 16px;
      background: none;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      color: var(--ink-2);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;

    .btn-outline:hover { border-color: var(--amber-line); color: var(--ink); }

    /* ── Bottom nav ─────────────────────────── */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(13,13,11,.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      display: flex;
      padding: 10px 10px 24px;
      gap: 4px;
      z-index: 10;
    }
    .nav-tab {
      flex: 1;
      background: none; border: none;
      color: var(--ink-3);
      padding: 7px 6px;
      cursor: pointer;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 0.65rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;

    }
    .nav-tab .ni { font-size: 1.1rem; line-height: 1; }
    .nav-tab.active { color: var(--ink); }
    .nav-tab.nav-add {
      background: var(--amber);
      color: #0D0D0B;
      font-weight: 600;
      border-radius: var(--r-sm);
    }
    .nav-tab.nav-add .ni { color: #0D0D0B; }

    /* ── Modal overlay ──────────────────────── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 400;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet {
      display: none;
      background: var(--bg-1);
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 430px;
      max-height: 90dvh;
      overflow-y: auto;
      padding: 0 0 40px;
    }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--line-2);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-inner { padding: 20px 22px 0; }
    .sheet-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-size: 1.3rem;
      letter-spacing: -0.025em;
      margin-bottom: 22px;
    }

    /* ── Form ───────────────────────────────── */
    .fg { margin-bottom: 16px; }
    .fl {
      display: block;
      font-size: 0.72rem;
      color: var(--ink-2);
      margin-bottom: 5px;
      letter-spacing: .01em;
    }
    .fi, .fs {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      color: var(--ink);
      padding: 10px 12px;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color .15s;
    }
    .fi:focus, .fs:focus { border-color: var(--amber-line); }
    .fhint {
      font-size: 0.7rem;
      color: var(--ink-3);
      margin-top: 4px;
    }
    .fhint a, .fhint button {
      color: var(--amber);
      background: none; border: none;
      cursor: pointer; font-size: inherit;
      padding: 0; text-decoration: underline;
    }

    /* Icon picker */
    .icon-grid {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .icon-opt {
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      border: 1px solid var(--line);
      background: var(--bg-2);
      transition: border-color .12s, background .12s;
    }
    .icon-opt.sel {
      border-color: var(--amber);
      background: var(--amber-bg);
    }

    /* Toggle */
    .tog-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .tog-row:last-of-type { border-bottom: none; }
    .tog-label { font-size: 0.88rem; color: var(--ink-2); }
    .toggle {
      width: 38px; height: 22px;
      border-radius: 11px;
      background: var(--bg-3);
      border: 1px solid var(--line-2);
      cursor: pointer;
      position: relative;
      transition: background .18s, border-color .18s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--amber); border-color: var(--amber); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform .18s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .toggle.on::after { transform: translateX(16px); }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--amber);
      color: #0D0D0B;
      border: none; border-radius: var(--r-sm);
      font-size: 0.9rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      margin-top: 12px;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary {
      width: 100%; padding: 11px;
      background: none;
      color: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      font-size: 0.86rem;
      font-family: inherit; cursor: pointer;
      margin-top: 7px;
    }

    /* ── Task templates ─────────────────────── */
    .tpl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .tpl-btn {
      padding: 9px 10px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      color: var(--ink-2);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color .12s, background .12s, color .12s;
    }
    .tpl-btn:hover { border-color: var(--line-2); color: var(--ink); }
    .tpl-btn.active { border-color: var(--amber-line); background: var(--amber-bg); color: var(--ink); }
    .tpl-or {
      text-align: center;
      font-size: 0.7rem;
      color: var(--ink-3);
      margin: 14px 0 6px;
      position: relative;
    }
    .tpl-or::before, .tpl-or::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%;
      height: 1px;
      background: var(--line);
    }

    .tpl-or::after  { right: 0; }

    /* ── Card actions row ────────────────────── */
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;

    .btn-done-sm {
      flex: 1;
      padding: 6px 10px;
      background: rgba(95,144,112,0.1);
      border: 1px solid rgba(95,144,112,0.2);

      color: #82C495;
      font-family: inherit;

    .btn-done-sm:hover { background: rgba(95,144,112,0.18); border-color: rgba(95,144,112,0.35); }
    .btn-share-sm {

      color: var(--ink-3);

    .done-check {

      border-radius: 50%;

      border: 1px solid rgba(95,144,112,0.3);

      color: #82C495;

    .done-meta { font-size: 0.68rem; color: var(--ink-3); font-family: 'Menlo','Monaco',monospace; }
    .done-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-edit-sm {

      color: var(--ink-3);
      font-family: inherit;
      cursor: pointer;
      transition: border-color .15s, color .15s;

    .btn-edit-sm:hover { border-color: var(--line-2); color: var(--ink-2); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 1.5px solid var(--line-2);

      animation: spin .7s linear infinite;
      vertical-align: middle;

  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-left">
      <span class="app-eyebrow">16-day outlook</span>
      <span class="app-title">Weather Window</span>
    </div>

      <button class="btn-icon-sm" id="btn-theme" title="Toggle theme" onclick="toggleTheme()">☽</button>
      <button class="btn-icon-sm" id="btn-refresh" title="Refresh forecast">↻</button>
    </div>
  </header>

  <div id="status-bar">
    <div class="s-dot" id="s-dot"></div>
    <span id="s-text">—</span>
  </div>

  <!-- Tasks view -->

  </div>

  <!-- Week view -->

  <!-- Done view -->

    <div class="s-section">
      <div class="s-section-label">Tasks</div>
      <div id="task-list-s"></div>

    </div>
    <div class="s-section">
      <div class="s-section-label">Data</div>
      <button class="btn-outline" onclick="clearData()" style="color:var(--ink-3)">Clear all data</button>

</div>

<!-- Bottom nav -->
<nav id="bottom-nav">
  <button class="nav-tab active" id="nav-home" onclick="setView('home')">
    <span class="ni">☀</span>Tasks
  </button>
  <button class="nav-tab" id="nav-week" onclick="setView('week')">
    <span class="ni">⊟</span>Week
  </button>

  </button>
</nav>

<!-- Sheet overlay -->
<div id="overlay" onclick="overlayTap(event)">

  <!-- Task sheet -->
  <div class="sheet" id="sheet-task">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-title">New task</div>
      <div class="fg">
        <label class="fl">Quick start — pick a template</label>
        <div class="tpl-grid" id="tpl-grid">
          <button class="tpl-btn" onclick="applyTemplate('paint')">🖌️ Paint / stain</button>
          <button class="tpl-btn" onclick="applyTemplate('mow')">🌿 Mow the lawn</button>
          <button class="tpl-btn" onclick="applyTemplate('wash')">🚗 Wash the car</button>
          <button class="tpl-btn" onclick="applyTemplate('spray')">💧 Spray weeds</button>
          <button class="tpl-btn" onclick="applyTemplate('concrete')">🏗️ Lay concrete</button>
          <button class="tpl-btn" onclick="applyTemplate('plant')">🌾 Plant / seed</button>
          <button class="tpl-btn" onclick="applyTemplate('dining')">🪑 Outdoor dining</button>
          <button class="tpl-btn" onclick="applyTemplate('walk')">🐾 Dog walk</button>
        </div>
      </div>
      <div class="tpl-or">or build your own</div>
      <div class="fg">

      <div class="fg">
        <label class="fl">Weather profile</label>
        <select id="t-profile" class="fs" onchange="profileChanged()">
          <option value="dry_calm">Dry &amp; calm — paint, spray (≤10 km/h, 3 h)</option>
          <option value="dry_only">Dry only — mow, wash (any wind, 1 h)</option>

          <label class="fl">Max wind km/h — blank to ignore</label>
          <input id="t-wind" class="fi" type="number" min="0" max="200" placeholder="25">

          <label class="fl">Min temp °C — blank to ignore</label>

<script>
// ── Constants ─────────────────────────────────────
const ICONS = ['🖌️','✂️','🚗','🌿','💧','🏡','🛖','🧺','🌾','🐾','🎪','⚽','🪴','🏗️','🌻','🪟','🧹','🚿','🪣','🌳'];

const PRESETS = {
  dry_calm: { maxWind:10,  minTemp:null, maxTemp:null, dur:3, rain:0 },
  dry_only: { maxWind:null,minTemp:null, maxTemp:null, dur:1, rain:0 },
  warm_dry: { maxWind:20,  minTemp:14,  maxTemp:38,  dur:2, rain:0 },
};

// ── State ─────────────────────────────────────────
let S = {
  locs:      [],
  tasks:     [],
  forecasts: {},
  outcomes:  [],
  results:   {},   // taskId → { windows: [...], _cooldown: bool, allDayScores: {} }
  sel:       {},   // taskId → selected window index
  selDay:    {},   // taskId → date string when user picks a non-viable day
  winHour:   {},   // taskId → manually dragged start hour (null = use optimal)
  view:      'home',
  loading:   false,
};

// ── Persist ───────────────────────────────────────
function save() {
  localStorage.setItem('ww_locs',  JSON.stringify(S.locs));
  localStorage.setItem('ww_tasks', JSON.stringify(S.tasks));
  localStorage.setItem('ww_fc',    JSON.stringify(S.forecasts));
  localStorage.setItem('ww_out',   JSON.stringify(S.outcomes));
  localStorage.setItem('ww_sel',   JSON.stringify(S.sel));
  localStorage.setItem('ww_wh',    JSON.stringify(S.winHour));
  localStorage.setItem('ww_sd',    JSON.stringify(S.selDay));
}
function load() {
  S.locs      = JSON.parse(localStorage.getItem('ww_locs')  || '[]');
  S.tasks     = JSON.parse(localStorage.getItem('ww_tasks') || '[]');
  S.forecasts = JSON.parse(localStorage.getItem('ww_fc')    || '{}');
  S.outcomes  = JSON.parse(localStorage.getItem('ww_out')   || '[]');
  S.sel       = JSON.parse(localStorage.getItem('ww_sel')   || '{}');
  S.winHour   = JSON.parse(localStorage.getItem('ww_wh')    || '{}');
  S.selDay    = JSON.parse(localStorage.getItem('ww_sd')    || '{}');
}

// ── Profile ───────────────────────────────────────
function prof(task) {
  if (task.profile === 'custom') return {
    maxWind: task.custom?.maxWind ?? null,
    minTemp: task.custom?.minTemp ?? null,
    maxTemp: task.custom?.maxTemp ?? null,
    dur:     task.dur,
    rain:    0
  };
  return { ...PRESETS[task.profile], dur: task.dur };
}

// ── Scoring ───────────────────────────────────────
function scoreHr(precip, wind, temp, p) {
  // Hard-exclude hours where rain risk is too high (>30% for dry tasks)
  const rainLimit = p.rain === 0 ? 30 : p.rain + 30;
  if (precip > rainLimit) return 0;
  let s = 100;
  // Graduated rain penalty — small chances barely affect score
  const rainFree = p.rain === 0 ? 10 : p.rain;
  if (precip > rainFree) s -= Math.min(50, (precip - rainFree) * 1.5);
  if (p.maxWind !== null) {
    if (wind > p.maxWind) s -= Math.min(40, (wind - p.maxWind) * 2.5);
    else if (wind < p.maxWind * 0.4) s += 4;
  }
  if (p.minTemp !== null && temp < p.minTemp) s -= Math.min(30, (p.minTemp - temp) * 3.5);
  if (p.maxTemp !== null && temp > p.maxTemp) s -= Math.min(20, (temp - p.maxTemp) * 2);
  return Math.max(0, Math.min(100, s));
}

function degToCompass(deg) {
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round((deg||0)/45)%8];
}

function buildWindowObj(fc, scores, s, e, minDur, p) {
  const winDay = fc.times[s].slice(0,10);
  const ds = fc.times.findIndex(t => t.startsWith(winDay));
  const de = Math.min(ds + 24, fc.times.length);
  const strip = [];
  const dayHourScores = [];
  for (let i = ds; i < de; i++) {
    let cls = 'night';
    const sc = scores[i] ?? -1;
    if (sc > 0) cls = sc >= 70 ? 'good' : sc >= 35 ? 'mar' : 'rain';
    else if ((fc.precip[i] ?? 0) > 0) cls = 'rain';
    strip.push({ cls });
    dayHourScores.push(sc);
  }
  const wStart = new Date(fc.times[s]);
  const wEnd   = new Date(fc.times[e]); wEnd.setHours(wEnd.getHours() + 1);
  const optimalStartHour = wStart.getHours();
  const sl = fc.precip.slice(s, e+1), wl = fc.wind.slice(s, e+1), tl = fc.temp.slice(s, e+1);
  const maxP = Math.max(...sl), maxW = Math.max(...wl);
  const avgT = tl.reduce((a,b)=>a+b,0)/tl.length;
  let sum = 0; for (let m = s; m <= e; m++) sum += scores[m];
  const avg = sum / (e - s + 1);

  // Wind direction: average bearing over window
  const wdl = fc.winddir ? fc.winddir.slice(s, e+1).filter(v=>v!=null) : [];
  const windCompass = wdl.length ? degToCompass(wdl.reduce((a,b)=>a+b,0)/wdl.length) : null;

  // UV: max over window
  const uvl = fc.uv ? fc.uv.slice(s, e+1).filter(v=>v!=null) : [];
  const maxUV = uvl.length ? Math.max(...uvl) : null;

  const parts = [];
  if (maxP === 0) parts.push(`${minDur}h dry`); else parts.push(`${Math.round(100-maxP)}% dry`);
  if (p.maxWind !== null) {
    parts.push(`wind ${Math.round(maxW)} km/h${windCompass ? ' ' + windCompass : ''}`);
  }
  parts.push(`${Math.round(avgT)}°C`);
  if (maxUV !== null && maxUV >= 3) parts.push(`UV ${maxUV.toFixed(0)}`);

  return { score: Math.round(avg), wStart, wEnd, strip, winDay, reason: parts.join(' · '), maxUV, windCompass, dayHourScores, optimalStartHour };
}

function findWindows(task, fc, maxResults = 5) {
  if (!fc) return null;
  const p = prof(task);
  const minDur = p.dur;
  const now = Date.now();
  const scores = [];

  for (let i = 0; i < fc.times.length; i++) {
    const t = new Date(fc.times[i]).getTime();
    if (t < now - 3600000) { scores.push(-1); continue; }
    if (task.daylight) {
      const ds = fc.times[i].slice(0,10);
      const di = fc.dailyTimes ? fc.dailyTimes.indexOf(ds) : -1;
      if (di >= 0) {
        const sr = new Date(fc.sunrises[di]).getTime();
        const ss = new Date(fc.sunsets[di]).getTime();
        if (t < sr || t > ss) { scores.push(-1); continue; }
      }
    }
    scores.push(scoreHr(fc.precip[i]??0, fc.wind[i]??0, fc.temp[i]??15, p));
  }

  // Find best sub-window per day
  const byDay = {};
  let i = 0;
  while (i < scores.length) {
    if (scores[i] < 20) { i++; continue; }
    let j = i;
    while (j < scores.length && scores[j] >= 20) j++;
    if (j - i >= minDur) {
      for (let k = i; k <= j - minDur; k++) {
        let sum = 0;
        for (let m = k; m < k + minDur; m++) sum += scores[m];
        const avg = sum / minDur;
        const day = fc.times[k].slice(0,10);
        if (!byDay[day] || avg > byDay[day].avg) byDay[day] = { avg, s: k, e: k + minDur - 1 };
      }
    }
    i = j;
  }

  // Collect best-hour score per day regardless of duration (for all-day chips)
  const allDayScores = {};
  for (let i = 0; i < fc.times.length; i++) {
    if (scores[i] <= 0) continue;
    const day = fc.times[i].slice(0, 10);
    if (allDayScores[day] == null || scores[i] > allDayScores[day]) allDayScores[day] = scores[i];
  }

  const days = Object.keys(byDay);
  if (!days.length) return { windows: null, allDayScores };

  // Sort: soonest-first for days within 2pts of the overall best score;
  // remaining days sorted by score descending. (Brief tiebreak rule.)
  const bestScore = Math.max(...days.map(d => byDay[d].avg));
  days.sort((a, b) => {
    const da = byDay[a], db = byDay[b];
    const aC = bestScore - da.avg <= 2, bC = bestScore - db.avg <= 2;
    if (aC && bC) return a < b ? -1 : 1;
    if (aC) return -1; if (bC) return 1;
    return db.avg - da.avg;
  });

  const windows = days.slice(0, maxResults).map(day => {
    const { s, e } = byDay[day];
    return buildWindowObj(fc, scores, s, e, minDur, p);
  });
  return { windows, allDayScores };
}

// ── Forecast ──────────────────────────────────────
async function fetchFC(loc) {
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${loc.lat}&longitude=${loc.lng}`
    + `&hourly=precipitation_probability,wind_speed_10m,winddirection_10m,temperature_2m,uv_index`
    + `&daily=sunrise,sunset&forecast_days=16&timezone=auto`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  return {
    fetchedAt:  Date.now(),
    times:      d.hourly.time,
    precip:     d.hourly.precipitation_probability,
    wind:       d.hourly.wind_speed_10m,
    winddir:    d.hourly.winddirection_10m,
    temp:       d.hourly.temperature_2m,
    uv:         d.hourly.uv_index,
    dailyTimes: d.daily.time,
    sunrises:   d.daily.sunrise,
    sunsets:    d.daily.sunset,
  };
}

async function refresh() {
  if (!S.locs.length) return;
  S.loading = true;
  renderStatus();
  for (const loc of S.locs) {
    try { S.forecasts[loc.id] = await fetchFC(loc); save(); }
    catch(e) { console.warn('fetch failed:', loc.label, e); }
  }
  S.loading = false;
  match();
  render();
}

// ── Match ─────────────────────────────────────────
function match() {
  for (const task of S.tasks) {
    const result = findWindows(task, S.forecasts[task.locId]);
    const cooldown = !!(task.recurring && task.lastDone &&
      (Date.now()-task.lastDone)/86400000 < (task.interval||7));
    if (!result) {
      S.results[task.id] = null;
    } else {
      const { windows, allDayScores } = result;
      S.results[task.id] = { windows: windows || [], _cooldown: cooldown, allDayScores };
      if (windows && S.sel[task.id] >= windows.length) S.sel[task.id] = 0;
    }
  }
}

// Build a view-only strip for a day that has no viable window
function getDayView(task, dateStr) {
  const fc = S.forecasts[task.locId];
  if (!fc) return null;
  const p = prof(task);
  const ds = fc.times.findIndex(t => t.startsWith(dateStr));
  if (ds < 0) return null;
  const de = Math.min(ds + 24, fc.times.length);
  const strip = [], dayHourScores = [];
  let bestScore = 0, bestHour = 0;
  for (let i = ds; i < de; i++) {
    const sc = scoreHr(fc.precip[i]??0, fc.wind[i]??0, fc.temp[i]??15, p);
    let cls = 'night';
    if (sc > 0) cls = sc >= 70 ? 'good' : sc >= 35 ? 'mar' : 'rain';
    else if ((fc.precip[i]??0) > 0) cls = 'rain';
    strip.push({ cls });
    dayHourScores.push(sc);
    if (sc > bestScore) { bestScore = sc; bestHour = i - ds; }
  }
  const wStart = new Date(fc.times[ds]);
  return { score: Math.round(bestScore), wStart, wEnd: new Date(wStart), strip, winDay: dateStr, dayHourScores, optimalStartHour: bestHour, noWindow: true };
}

// Active window for a task (respects user selection and manual hour drag)
function getWin(taskId) {
  const r = S.results[taskId];
  if (!r || r._cooldown) return null;
  // Non-viable day selected by user
  if (S.selDay[taskId]) {
    const task = S.tasks.find(t => t.id === taskId);
    return task ? getDayView(task, S.selDay[taskId]) : null;
  }
  if (!r.windows?.length) return null;
  const w = r.windows[S.sel[taskId] || 0];
  if (!w) return null;
  const manualHour = S.winHour[taskId];
  if (manualHour == null || !w.dayHourScores) return w;
  const task = S.tasks.find(t => t.id === taskId);
  const dur = prof(task).dur;
  const start = Math.max(0, Math.min(24 - dur, manualHour));
  const slice = w.dayHourScores.slice(start, start + dur);
  const avgScore = Math.round(slice.reduce((a, b) => a + Math.max(0, b), 0) / Math.max(1, dur));
  const newWStart = new Date(w.wStart); newWStart.setHours(start, 0, 0, 0);
  const newWEnd = new Date(newWStart); newWEnd.setHours(start + dur, 0, 0, 0);
  return { ...w, score: avgScore, wStart: newWStart, wEnd: newWEnd, manualHour: start };
}

function selectWin(taskId, idx) {
  S.sel[taskId] = idx;
  S.selDay[taskId] = null;
  S.winHour[taskId] = null;
  save();
  renderCards();
}

function selectDay(taskId, dateStr) {
  S.selDay[taskId] = dateStr;
  S.winHour[taskId] = null;
  save();
  renderCards();
}

// ── Format ────────────────────────────────────────
function fmtWin(s, e) {
  const DAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const sd = new Date(s), ed = new Date(e), now = new Date();
  const diff = (sd - now) / 86400000;
  const day  = diff < 1 ? 'Today' : diff < 2 ? 'Tomorrow' : DAY[sd.getDay()];
  const fh   = d => { let h=d.getHours(); const p=h>=12?'pm':'am'; h=h%12||12; return `${h}${p}`; };
  return `${day}, ${fh(sd)}–${fh(ed)}`;
}

function bandClass(score) {
  if (!score && score!==0) return 'none';
  return score>=75?'high':score>=45?'mid':'low';
}

function locLabel(id) { return S.locs.find(l=>l.id===id)?.label||'—'; }

// ── Reminder ─────────────────────────────────────
function wantReminder(task, w) {
  if (!w || w.score < 75) return false;
  const p = task.lastSug;
  if (!p) return true;
  if (p.dismissed) {
    if (Math.abs(w.score - p.score) <= 2 &&
        new Date(p.wStart).toDateString() === new Date(w.wStart).toDateString()) return false;
    return true;
  }
  return false;
}

function pastWin(task) {
  const s = task.lastSug;
  return s && !s.outcomeLogged && new Date(s.wEnd) < new Date();
}

function genICS(task, r) {
  const fmt = d => d.toISOString().replace(/[-:.]/g,'').slice(0,-4)+'Z';
  const fh = d => { let h=new Date(d).getHours(); const p=h>=12?'pm':'am'; h=h%12||12; return `${h}${p}`; };
  const dateStr = new Date(r.wStart).toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long'});
  const summary = `${task.icon} ${task.name} — ${fh(r.wStart)} window`;
  const desc = `Weather Window found a score-${r.score} window on ${dateStr} from ${fh(r.wStart)} to ${fh(r.wEnd)}.\\n${r.reason}`;
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Weather Window//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `DTSTART:${fmt(new Date(r.wStart))}`,
    `DTEND:${fmt(new Date(r.wEnd))}`,
    `SUMMARY:${summary}`,
    `DESCRIPTION:${desc}`,
    'BEGIN:VALARM',
    'TRIGGER:-PT60M',
    'ACTION:DISPLAY',
    `DESCRIPTION:${task.name} weather window opens in 1 hour`,
    'END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
  a.download = `${task.name.replace(/\s+/g,'-')}.ics`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

function addReminder(id) {
  const task=S.tasks.find(t=>t.id===id), w=getWin(id);
  if (!task||!w) return;
  genICS(task,w);
  task.lastSug={wStart:w.wStart,wEnd:w.wEnd,score:w.score,dismissed:false,outcomeLogged:false};
  save(); renderCards();
}

function dismissReminder(id) {
  const task=S.tasks.find(t=>t.id===id), w=getWin(id);
  if (!task||!w) return;
  task.lastSug={wStart:w.wStart,wEnd:w.wEnd,score:w.score,dismissed:true,outcomeLogged:false};
  save(); renderCards();
}

function logOutcome(id, did, held) {
  const task=S.tasks.find(t=>t.id===id);
  if (!task) return;
  S.outcomes.push({taskId:id,did,held,at:Date.now()});
  if (task.lastSug) task.lastSug.outcomeLogged=true;
  if (did) task.lastDone=Date.now();
  save(); renderCards();
}

function accTag(id) {
  const done=S.outcomes.filter(o=>o.taskId===id&&o.did);
  if (done.length<2) return '';
  const pct=Math.round(done.filter(o=>o.held).length/done.length*100);
  return `<span class="acc-tag">${pct}% accurate · ${done.length} logged</span>`;
}

// ── Render cards ──────────────────────────────────
function renderCards() {
  const el = document.getElementById('cards');
  if (!el) return;

  if (!S.locs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-card">
      <div class="empty-glyph">📍</div>
      <div class="empty-title">No location yet</div>
      <p class="empty-body">Add a location so Weather Window knows where to fetch the forecast.</p>
      <button class="btn-outline" onclick="openSheet('loc')" style="margin:0">+ Add location</button>
    </div></div>`;
    return;
  }

  if (!S.tasks.length) {
    el.innerHTML = `<div class="empty"><div class="empty-card">
      <div class="empty-glyph">☀</div>
      <div class="empty-title">No tasks yet</div>
      <p class="empty-body">Add an outdoor task — painting, mowing, washing the car — and Weather Window will find the best window in the next 16 days.</p>
      <button class="btn-outline" onclick="openSheet('task')" style="margin:0">+ Add task</button>
    </div></div>`;
    return;
  }

  const sorted = [...S.tasks].filter(task => {
    if (!task.lastDone) return true;
    if (!task.recurring) return false;
    return (Date.now() - task.lastDone) / 86400000 >= (task.interval || 7);
  }).sort((a,b)=>{
    const ra=S.results[a.id], rb=S.results[b.id];
    if (!ra&&!rb) return 0; if (!ra) return 1; if (!rb) return -1;
    return new Date(ra.wStart)-new Date(rb.wStart);
  });

  el.innerHTML = sorted.map(task => {
    const r   = S.results[task.id];
    const w   = getWin(task.id);
    const sel = S.sel[task.id] || 0;
    const bc  = w ? bandClass(w.score) : 'none';
    const rem = wantReminder(task, w);
    const pw  = pastWin(task);

    let body = '';
    if (r && r._cooldown) {
      const dLeft = Math.ceil((task.interval||7)-(Date.now()-task.lastDone)/86400000);
      body = `<p class="card-muted">On cooldown — check back in ~${dLeft} day${dLeft!==1?'s':''}.</p>
              <div class="card-reason" style="margin:0"><span class="card-location-tag">${locLabel(task.locId)}</span></div>`;
    } else if (w) {
      const manualHour = w.noWindow ? null : S.winHour[task.id];
      const dur = prof(task).dur;
      const winStart = manualHour != null ? manualHour : w.optimalStartHour;
      const stripHtml = w.strip.map((h, i) =>
        `<div class="s-hr ${h.cls}${(!w.noWindow && i >= winStart && i < winStart + dur) ? ' win' : ''}"></div>`
      ).join('');
      const dayStr = new Date(w.wStart).toLocaleDateString('en',{weekday:'long',day:'numeric',month:'short'});
      const fh = dd => { let h=new Date(dd).getHours(); const p=h>=12?'pm':'am'; h=h%12||12; return `${h}${p}`; };

      // All 16 days as chips (viable days selectable, rest dimmed)
      const today = new Date(); today.setHours(0,0,0,0);
      const allChips = Array.from({length:16}, (_, di) => {
        const d = new Date(today); d.setDate(today.getDate() + di);
        const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const winIdx = r.windows.findIndex(ww => ww.winDay === ds);
        const isViable = winIdx >= 0;
        const isActive = S.selDay[task.id]
          ? ds === S.selDay[task.id]
          : (isViable && winIdx === sel);
        const score = isViable ? r.windows[winIdx].score : Math.round(r.allDayScores?.[ds] || 0);
        const dayName = di === 0 ? 'Today' : di === 1 ? 'Tomorrow'
          : d.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'});
        const timeStr = isViable ? fh(new Date(r.windows[winIdx].wStart)) : '—';
        const bc = isViable ? bandClass(score) : (score >= 45 ? 'mid' : 'low');
        const clickHandler = isViable
          ? `onclick="selectWin('${task.id}',${winIdx})"`
          : `onclick="selectDay('${task.id}','${ds}')"`;
        return `<button class="alt-chip${isActive?' active':''}${!isViable?' dim':''}" ${clickHandler}>
          <span class="alt-day">${dayName}</span>
          <span class="alt-time">${timeStr}</span>
          <span class="alt-score ${bc}">${score||'—'}</span>
        </button>`;
      }).join('');

      const winBarHtml = w.noWindow ? '' :
        `<div class="strip-win-bar" id="winbar-${task.id}" style="left:${(winStart/24*100).toFixed(1)}%;width:${(dur/24*100).toFixed(1)}%"></div>`;
      const dragAttrs = w.noWindow ? '' :
        `onpointerdown="stripPointerDown(event,'${task.id}')" onpointermove="stripPointerMove(event,'${task.id}')" onpointerup="stripPointerUp(event,'${task.id}')" onpointercancel="stripPointerUp(event,'${task.id}')"`;
      body = `
        <div class="card-window-label">${w.noWindow ? 'Forecast only' : 'Best window'}</div>
        <div class="card-window${w.noWindow ? ' card-window-dim' : ''}" id="win-time-${task.id}">${
          w.noWindow
            ? `No ${dur}h window — conditions too broken`
            : fmtWin(w.wStart, w.wEnd)
        }</div>
        <div class="card-reason">${w.noWindow ? `Best single hour scores ~${w.score}` : w.reason}<span class="card-location-tag">${locLabel(task.locId)}</span></div>
        <div class="strip-wrap">
          <div class="strip-day-label">${dayStr}</div>
          <div class="strip-container">
            <div class="strip" id="strip-${task.id}" ${dragAttrs}>${stripHtml}</div>
            ${winBarHtml}
          </div>
          <div class="strip-ticks">
            <span style="left:0%">12am</span>
            <span style="left:25%">6am</span>
            <span style="left:50%">noon</span>
            <span style="left:75%">6pm</span>
            <span style="left:100%">12am</span>
          </div>
          ${w.noWindow ? '' : '<div class="strip-hint">drag to move window</div>'}
        </div>
        <div class="alts">
          <span class="alts-label">All days</span>
          <div class="alts-row">${allChips}</div>
        </div>
        ${w.noWindow ? '' : `<div class="card-actions">
          <button class="btn-done-sm" onclick="markDone('${task.id}')">✓ Mark done</button>
          <button class="btn-share-sm" onclick="shareWin('${task.id}')">↗ Share</button>
        </div>`}`;
    } else {
      body = `<p class="card-muted">No suitable window in the next 16 days.</p>
              <div class="card-reason" style="margin:0"><span class="card-location-tag">${locLabel(task.locId)}</span></div>`;
    }

    const footer = (rem || pw) ? `<div class="card-footer">${
      rem ? `<p class="reminder-text"><strong>${fmtWin(w.wStart,w.wEnd).split(',')[0]}</strong> looks ideal — add a reminder?</p>
        <div class="row-btns">
          <button class="btn-cta" onclick="addReminder('${task.id}')">Add to calendar</button>
          <button class="btn-ghost-sm" onclick="dismissReminder('${task.id}')">Dismiss</button>
        </div>` : ''
    }${
      pw ? `<p class="outcome-q">Did you do it — and did the weather hold?</p>
        <div class="row-btns">
          <button class="btn-outcome" onclick="logOutcome('${task.id}',true,true)">Done ✓ held</button>
          <button class="btn-outcome" onclick="logOutcome('${task.id}',true,false)">Done, off</button>
          <button class="btn-outcome" onclick="logOutcome('${task.id}',false,false)">Skipped</button>
        </div>` : ''
    }</div>` : '';

    const isPeak = w && !w.noWindow && w.score >= 90;
    return `<div class="card${isPeak?' peak':''}">
      <div class="card-inner">
        <div class="card-accent ${bc}"></div>
        <div class="card-body">
          <div class="card-head">
            <span class="task-icon">${task.icon||'☀'}</span>
            <span class="task-name">${task.name}</span>
            ${w&&!w.noWindow?`<span class="score-pill ${bc}" id="score-${task.id}">${w.score}</span>`:''}
            <button class="btn-del" onclick="deleteTaskFromCard('${task.id}')" title="Delete task" style="margin-left:4px">✕</button>
          </div>
          ${body}
          ${accTag(task.id)}
        </div>
      </div>
      ${footer}
    </div>`;
  }).join('');
}

// ── Render week ───────────────────────────────────
function renderWeek() {
  const el = document.getElementById('week-rows');
  if (!el) return;
  if (!S.tasks.length||!S.locs.length) {
    el.innerHTML='<p style="color:var(--ink-3);font-size:.83rem;padding:0 6px">Add tasks to see the week overview.</p>';
    return;
  }
  const today=new Date(); today.setHours(0,0,0,0);
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  el.innerHTML = Array.from({length:7},(_,i)=>{
    const d=new Date(today); d.setDate(today.getDate()+i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const hits=S.tasks.map(task=>{
      const r=S.results[task.id];
      if (!r||r._cooldown) return null;
      const w=getWin(task.id);
      if (!w||w.winDay!==ds) return null;
      return {task,w};
    }).filter(Boolean);

    const bars = hits.length ? hits.map(({task,w})=>{
      const ws=new Date(w.wStart), we=new Date(w.wEnd);
      const base=new Date(ws); base.setHours(0,0,0,0);
      const left=((ws-base)/864000).toFixed(1);
      const width=Math.min(((we-ws)/864000),100-parseFloat(left)).toFixed(1);
      const color=w.score>=75?'#2A5438':w.score>=45?'#4A3C18':'#4A2828';
      return `<div>
        <div class="wk-bar-bg"><div class="wk-bar-fill" style="left:${left}%;width:${width}%;background:${color}"></div></div>
        <div class="wk-task-label">${task.icon} ${task.name}</div>
      </div>`;
    }).join('') : `<div class="wk-empty"></div>`;

    return `<div class="week-row">
      <div class="wk-day">
        <span class="wk-day-name">${DAYS[d.getDay()]}</span>
        <span class="wk-day-num">${d.getDate()}</span>
      </div>
      <div class="wk-bars">${bars}</div>
    </div>`;
  }).join('');
}

// ── Render settings ───────────────────────────────
function renderSettings() {
  const ll=document.getElementById('loc-list');
  const tl=document.getElementById('task-list-s');
  if (!ll||!tl) return;
  ll.innerHTML=S.locs.map(l=>`
    <div class="s-list-item">
      <div>
        <div class="s-item-name">${l.label}</div>
        <div class="s-item-sub">${l.lat}, ${l.lng}</div>
      </div>
      <button class="btn-del" onclick="deleteLoc('${l.id}')">✕</button>
    </div>`).join('')||'<p style="color:var(--ink-3);font-size:.78rem;padding:4px 6px 10px">No locations yet</p>';
  tl.innerHTML=S.tasks.map(t=>`
    <div class="s-list-item">
      <div>
        <div class="s-item-name">${t.icon} ${t.name}</div>
        <div class="s-item-sub">${t.profile}</div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn-edit-sm" onclick="editTask('${t.id}')">Edit</button>
        <button class="btn-del" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    </div>`).join('')||'<p style="color:var(--ink-3);font-size:.78rem;padding:4px 6px 10px">No tasks yet</p>';
}

// ── Render status ─────────────────────────────────
function renderStatus() {
  const dot=document.getElementById('s-dot');
  const txt=document.getElementById('s-text');
  if (!dot||!txt) return;
  if (S.loading) {
    dot.className='s-dot';
    txt.innerHTML='<span class="spinner"></span> Fetching forecast…';
    return;
  }
  if (!S.locs.length) { dot.className='s-dot'; txt.textContent='No location — add one in Settings'; return; }
  const ff=Object.values(S.forecasts);
  if (!ff.length) { dot.className='s-dot'; txt.textContent='No forecast — tap ↻ to fetch'; return; }
  const latest=Math.max(...ff.map(f=>f.fetchedAt||0));
  const ageH=(Date.now()-latest)/3600000;
  const when=new Date(latest).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (ageH>3) { dot.className='s-dot stale'; txt.textContent=`Stale · last fetched ${when}`; }
  else         { dot.className='s-dot live';  txt.textContent=`Live · ${when}`; }
}

function render() { renderCards(); renderWeek(); renderSettings(); renderDone(); renderStatus(); }

// ── View routing ──────────────────────────────────
function setView(v) {
  S.view=v;
  ['home','week','done','settings'].forEach(n=>{
    document.getElementById(`view-${n}`).classList.toggle('active', n===v);
    const nb=document.getElementById(`nav-${n}`);
    if (nb) nb.classList.toggle('active', n===v);
  });
  if (v==='settings') renderSettings();
  if (v==='week') renderWeek();
  if (v==='done') renderDone();
}

// ── Sheet ─────────────────────────────────────────
function openSheet(name) {
  document.getElementById('overlay').style.display='flex';
  document.querySelectorAll('.sheet').forEach(s=>s.style.display='none');
  document.getElementById(`sheet-${name}`).style.display='block';
  if (name==='task') initTaskForm();
  if (name==='loc')  initLocForm();
}

function closeSheet() {
  document.getElementById('overlay').style.display='none';
  document.querySelectorAll('.sheet').forEach(s=>s.style.display='none');
  _editTaskId = null;
  const title = document.querySelector('#sheet-task .sheet-title');
  if (title) title.textContent = 'New task';
}

function overlayTap(e) {
  if (e.target===document.getElementById('overlay')) closeSheet();
}

// ── Task form ─────────────────────────────────────
function initTaskForm() {
  document.getElementById('t-name').value='';
  document.getElementById('t-profile').value='dry_calm';
  document.getElementById('t-dur').value='3';
  document.getElementById('tog-day').className='toggle';
  document.getElementById('tog-rec').className='toggle';
  document.getElementById('custom-block').style.display='none';
  document.getElementById('recur-block').style.display='none';
  const ig=document.getElementById('icon-grid');
  ig.innerHTML=ICONS.map((ic,i)=>`<div class="icon-opt${i===0?' sel':''}" onclick="pickIcon(this)">${ic}</div>`).join('');
  const sel=document.getElementById('t-loc');
  sel.innerHTML=S.locs.length
    ?S.locs.map(l=>`<option value="${l.id}">${l.label}</option>`).join('')
    :'<option value="">— Add a location first —</option>';
}


function pickIcon(el) {
  document.querySelectorAll('.icon-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

function profileChanged() {
  const v=document.getElementById('t-profile').value;
  document.getElementById('custom-block').style.display=v==='custom'?'block':'none';
  const durs={dry_calm:3,dry_only:1,warm_dry:2,custom:2};
  document.getElementById('t-dur').value=durs[v]||2;
}

function showRecurring() {
  const on=document.getElementById('tog-rec').classList.contains('on');
  document.getElementById('recur-block').style.display=on?'block':'none';
}

function uid() { return (crypto.randomUUID?crypto.randomUUID().slice(0,8):Math.random().toString(36).slice(2,10)); }

function saveTask() {
  const name=document.getElementById('t-name').value.trim();
  if (!name) { alert('Please enter a task name'); return; }
  const locId=document.getElementById('t-loc').value;
  if (!locId) { alert('Please add a location first'); return; }
  const icon    = document.querySelector('.icon-opt.sel')?.textContent||'☀';
  const profile = document.getElementById('t-profile').value;
  const dur     = parseInt(document.getElementById('t-dur').value)||2;
  const daylight= document.getElementById('tog-day').classList.contains('on');
  const recurring=document.getElementById('tog-rec').classList.contains('on');
  const interval= parseInt(document.getElementById('t-interval')?.value)||7;
  let custom=null;
  if (profile==='custom') custom={
    maxWind: parseFloat(document.getElementById('t-wind').value)||null,
    minTemp: parseFloat(document.getElementById('t-tmin').value)||null,
    maxTemp: parseFloat(document.getElementById('t-tmax').value)||null,
  };
  if (_editTaskId) {
    const task = S.tasks.find(t => t.id === _editTaskId);
    if (task) Object.assign(task, {name,icon,profile,custom,dur,daylight,recurring,interval,locId});
    _editTaskId = null;
  } else {
    S.tasks.push({id:uid(),name,icon,profile,custom,dur,daylight,recurring,interval,locId,lastDone:null,lastSug:null});
  }
  save(); closeSheet(); match(); render(); setView('home');
}

// ── Location form ─────────────────────────────────
let _geoTimer = null;
let _pendingLoc = null; // { lat, lng, defaultLabel }

function initLocForm() {
  document.getElementById('l-search').value = '';
  document.getElementById('l-name').value = '';
  document.getElementById('l-results').innerHTML = '';
  document.getElementById('l-selected').style.display = 'none';
  document.getElementById('l-searching').style.display = 'none';
  _pendingLoc = null;
}

function geoSearch() {
  clearTimeout(_geoTimer);
  const q = document.getElementById('l-search').value.trim();
  document.getElementById('l-results').innerHTML = '';
  document.getElementById('l-selected').style.display = 'none';
  _pendingLoc = null;
  if (q.length < 2) return;
  _geoTimer = setTimeout(async () => {
    document.getElementById('l-searching').style.display = 'block';
    try {
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
      const data = await res.json();
      renderGeoResults(data.results || []);
    } catch(e) {
      document.getElementById('l-results').innerHTML = '<p class="fhint" style="padding:6px 0;color:var(--red)">Search failed — check your connection.</p>';
    }
    document.getElementById('l-searching').style.display = 'none';
  }, 380);
}

function renderGeoResults(results) {
  const el = document.getElementById('l-results');
  if (!results.length) {
    el.innerHTML = '<p class="fhint" style="padding:6px 0">No places found — try a different spelling.</p>';
    return;
  }
  el.innerHTML = results.map((r, i) => {
    const parts = [r.admin1, r.country].filter(Boolean).join(', ');
    return `<div class="geo-result" onclick="pickGeoResult(${i})" data-idx="${i}"
      data-lat="${r.latitude}" data-lng="${r.longitude}"
      data-name="${r.name}" data-sub="${parts}">
      <span class="geo-result-name">${r.name}</span>
      <span class="geo-result-sub">${parts}</span>
    </div>`;
  }).join('');
}

function pickGeoResult(idx) {
  const el = document.querySelector(`.geo-result[data-idx="${idx}"]`);
  if (!el) return;
  _pendingLoc = {
    lat: parseFloat(el.dataset.lat),
    lng: parseFloat(el.dataset.lng),
    defaultLabel: [el.dataset.name, el.dataset.sub].filter(Boolean).join(', ')
  };
  document.getElementById('l-name').value = el.dataset.name;
  document.getElementById('l-results').innerHTML = '';
  document.getElementById('l-selected').style.display = 'block';
}

function saveLocation() {
  if (!_pendingLoc) { alert('Search for and select a place first'); return; }
  const label = document.getElementById('l-name').value.trim() || _pendingLoc.defaultLabel;
  S.locs.push({ id: uid(), label, lat: _pendingLoc.lat, lng: _pendingLoc.lng });
  save(); closeSheet(); renderSettings(); refresh();
}

function deleteLoc(id) {
  if (!confirm('Remove this location?')) return;
  S.locs=S.locs.filter(l=>l.id!==id);
  delete S.forecasts[id];
  save(); renderSettings(); render();
}

function deleteTask(id) {
  if (!confirm('Remove this task?')) return;
  S.tasks=S.tasks.filter(t=>t.id!==id);
  delete S.results[id];
  save(); renderSettings(); renderCards();
}

function clearData() {
  if (!confirm('Clear all data?')) return;
  localStorage.clear();
  S={locs:[],tasks:[],forecasts:{},outcomes:[],results:{},sel:{},view:'home',loading:false};
  render(); setView('home');
}

function detectGeo() {
  if (!navigator.geolocation) { alert('Geolocation not available'); return; }
  navigator.geolocation.getCurrentPosition(p => {
    _pendingLoc = { lat: p.coords.latitude, lng: p.coords.longitude, defaultLabel: 'Current location' };
    document.getElementById('l-search').value = '';
    document.getElementById('l-results').innerHTML = '';
    document.getElementById('l-name').value = 'Current location';
    document.getElementById('l-selected').style.display = 'block';
  }, () => alert('Could not get your location'));
}

// ── Theme ─────────────────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  applyTheme(next);
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ww_theme', theme);
  document.getElementById('btn-theme').textContent = theme === 'light' ? '☽' : '☀';
}

// ── Delete from card ──────────────────────────────
function deleteTaskFromCard(id) {
  if (!confirm('Remove this task?')) return;
  S.tasks = S.tasks.filter(t => t.id !== id);
  delete S.results[id];
  save(); renderSettings(); renderCards();
}

// ── Strip drag ────────────────────────────────────
let _drag = null;

function stripPointerDown(e, taskId) {
  const w = S.results[taskId]?.windows?.[S.sel[taskId] || 0];
  if (!w?.dayHourScores) return;
  _drag = { taskId };
  e.currentTarget.setPointerCapture(e.pointerId);
  stripUpdateFromEvent(e, taskId, w);
}

function stripPointerMove(e, taskId) {
  if (!_drag || _drag.taskId !== taskId) return;
  const w = S.results[taskId]?.windows?.[S.sel[taskId] || 0];
  if (!w?.dayHourScores) return;
  stripUpdateFromEvent(e, taskId, w);
}

function stripPointerUp(e, taskId) {
  if (!_drag || _drag.taskId !== taskId) return;
  _drag = null;
  save();
  renderCards();
}

function stripUpdateFromEvent(e, taskId, w) {
  const strip = document.getElementById('strip-' + taskId);
  if (!strip) return;
  const rect = strip.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const task = S.tasks.find(t => t.id === taskId);
  const dur = prof(task).dur;
  const hour = Math.max(0, Math.min(24 - dur, Math.floor(pct * 24)));
  S.winHour[taskId] = hour;
  // Update strip highlight in place
  const blocks = strip.children;
  for (let i = 0; i < blocks.length; i++) blocks[i].classList.toggle('win', i >= hour && i < hour + dur);
  // Move win bar
  const winBar = document.getElementById('winbar-' + taskId);
  if (winBar) { winBar.style.left = (hour/24*100).toFixed(1)+'%'; winBar.style.width = (dur/24*100).toFixed(1)+'%'; }
  // Update score pill and time label in place
  const slice = w.dayHourScores.slice(hour, hour + dur);
  const avg = Math.round(slice.reduce((a, b) => a + Math.max(0, b), 0) / Math.max(1, dur));
  const pill = document.getElementById('score-' + taskId);
  if (pill) { pill.textContent = avg; pill.className = 'score-pill ' + (avg >= 75 ? 'high' : avg >= 45 ? 'mid' : 'low'); }
  const timeEl = document.getElementById('win-time-' + taskId);
  if (timeEl) {
    const ns = new Date(w.wStart); ns.setHours(hour, 0, 0, 0);
    const ne = new Date(ns); ne.setHours(hour + dur, 0, 0, 0);
    timeEl.textContent = fmtWin(ns, ne);
  }
}

// ── Done view ─────────────────────────────────────
function isDone(task) {
  if (!task.lastDone) return false;
  if (!task.recurring) return true;
  return (Date.now() - task.lastDone) / 86400000 < (task.interval || 7);
}

function renderDone() {
  const el = document.getElementById('done-list');
  if (!el) return;
  const done = S.tasks.filter(isDone);
  if (!done.length) {
    el.innerHTML = `<div class="empty"><div class="empty-card">
      <div class="empty-glyph">✓</div>
      <div class="empty-title">Nothing done yet</div>
      <p class="empty-body">Completed tasks appear here. Tap "Mark done" on any active task card.</p>
    </div></div>`;
    return;
  }
  const timeAgo = t => {
    const h = (Date.now()-t)/3600000;
    if (h < 24) return `${Math.round(h)}h ago`;
    return `${Math.floor(h/24)}d ago`;
  };
  el.innerHTML = done.map(task => {
    const coolLeft = task.recurring
      ? Math.ceil((task.interval||7) - (Date.now()-task.lastDone)/86400000)
      : null;
    const meta = coolLeft !== null
      ? `Done ${timeAgo(task.lastDone)} · back in ${coolLeft}d`
      : `Done ${timeAgo(task.lastDone)}`;
    return `<div class="done-card">
      <div class="done-check">✓</div>
      <div class="done-info">
        <div class="done-name">${task.icon} ${task.name}</div>
        <div class="done-meta">${meta}</div>
      </div>
      <div class="done-actions">
        <button class="btn-edit-sm" onclick="editTask('${task.id}')">Edit</button>
        <button class="btn-reactivate" onclick="reactivateTask('${task.id}')">Re-activate</button>
      </div>
    </div>`;
  }).join('');
}

function reactivateTask(id) {
  const task = S.tasks.find(t => t.id === id);
  if (!task) return;
  task.lastDone = null;
  save(); match(); renderCards(); renderDone();
}

// ── Edit task ─────────────────────────────────────
let _editTaskId = null;

function editTask(id) {
  _editTaskId = id;
  const task = S.tasks.find(t => t.id === id);
  if (!task) return;
  openSheet('task');
  // Sheet opens blank first (initTaskForm runs), then we fill it
  requestAnimationFrame(() => {
    document.querySelector('#sheet-task .sheet-title').textContent = 'Edit task';
    document.getElementById('t-name').value = task.name;
    document.getElementById('t-profile').value = task.profile;
    document.getElementById('t-dur').value = task.dur;
    if (task.daylight) document.getElementById('tog-day').classList.add('on');
    if (task.recurring) { document.getElementById('tog-rec').classList.add('on'); showRecurring(); }
    if (task.interval) document.getElementById('t-interval').value = task.interval;
    if (task.profile === 'custom') {
      document.getElementById('custom-block').style.display = 'block';
      if (task.custom?.maxWind) document.getElementById('t-wind').value = task.custom.maxWind;
      if (task.custom?.minTemp) document.getElementById('t-tmin').value = task.custom.minTemp;
      if (task.custom?.maxTemp) document.getElementById('t-tmax').value = task.custom.maxTemp;
    }
    document.getElementById('t-loc').value = task.locId;
    document.querySelectorAll('.icon-opt').forEach(el => {
      el.classList.toggle('sel', el.textContent.trim() === task.icon.trim());
    });
  });
}

// ── Templates ─────────────────────────────────────
const TEMPLATES = {
  paint:    { name:'Paint the fence',  icon:'🖌️', profile:'dry_calm', dur:3, daylight:true  },
  mow:      { name:'Mow the lawn',     icon:'🌿', profile:'dry_only', dur:1, daylight:true  },
  wash:     { name:'Wash the car',     icon:'🚗', profile:'dry_only', dur:2, daylight:false },
  spray:    { name:'Spray weeds',      icon:'💧', profile:'dry_calm', dur:2, daylight:true  },
  concrete: { name:'Lay concrete',     icon:'🏗️', profile:'dry_calm', dur:4, daylight:true  },
  plant:    { name:'Plant seedlings',  icon:'🌾', profile:'warm_dry', dur:2, daylight:true  },
  dining:   { name:'Outdoor dining',   icon:'🪑', profile:'warm_dry', dur:3, daylight:false },
  walk:     { name:'Dog walk',         icon:'🐾', profile:'dry_only', dur:1, daylight:false },
};

function applyTemplate(key) {
  const t = TEMPLATES[key];
  document.getElementById('t-name').value = t.name;
  document.getElementById('t-profile').value = t.profile;
  document.getElementById('t-dur').value = t.dur;
  if (t.daylight) document.getElementById('tog-day').classList.add('on');
  else document.getElementById('tog-day').classList.remove('on');
  profileChanged();
  document.querySelectorAll('.icon-opt').forEach(el => {
    el.classList.toggle('sel', el.textContent.trim() === t.icon);
  });
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  const active = [...document.querySelectorAll('.tpl-btn')].find(b => b.onclick?.toString().includes(`'${key}'`));
  if (active) active.classList.add('active');
}

// ── Share ─────────────────────────────────────────
function shareWin(taskId) {
  const task = S.tasks.find(t => t.id === taskId);
  const w = getWin(taskId);
  if (!task || !w) return;
  const text = `${task.icon} ${task.name}\n${fmtWin(w.wStart, w.wEnd)} — ${w.reason}\nScore: ${w.score}/100`;
  if (navigator.share) {
    navigator.share({ title: 'Weather Window', text });
  } else {
    navigator.clipboard?.writeText(text).then(() => {
      alert('Copied to clipboard');
    });
  }
}

// ── Mark done ─────────────────────────────────────
function markDone(taskId) {
  const task = S.tasks.find(t => t.id === taskId);
  if (!task) return;
  S.outcomes.push({ taskId, did: true, held: true, at: Date.now() });
  if (task.lastSug) task.lastSug.outcomeLogged = true;
  task.lastDone = Date.now();
  save(); match(); renderCards();
}

// ── Boot ──────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', refresh);
applyTheme(localStorage.getItem('ww_theme') || 'dark');
load(); match(); render(); setView('home');

const ffs=Object.values(S.forecasts);
const newest=ffs.length?Math.max(...ffs.map(f=>f.fetchedAt||0)):0;
if (S.locs.length && Date.now()-newest > 3*3600000) refresh();
</script>
